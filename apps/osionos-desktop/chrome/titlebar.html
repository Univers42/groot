<!-- osionos desktop custom window chrome — injected into the bundled index.html
     before </body> by apps/osionos-desktop/build.sh. Frameless window
     (decorations:false): this is the draggable header + window controls +
     resize handles. Styled to the osionos design chart (logo #0B63CE, accent
     #0071e3 / dark #38bdf8, surfaces #f5f5f7 / #1a1d23). Only activates under
     Tauri (window.__TAURI__); a plain browser ignores it. -->
<style id="osio-tb-style">
  :root{
    --tb-h:36px; --tb-bg:#f5f5f7; --tb-fg:#1d1d1f; --tb-sub:#6e6e73;
    --tb-border:#e2e2e7; --tb-hover:rgba(0,0,0,.07); --tb-accent:#0071e3;
  }
  @media (prefers-color-scheme: dark){
    :root{ --tb-bg:#1a1d23; --tb-fg:#e8e8ea; --tb-sub:#9aa0aa;
           --tb-border:#2a2f37; --tb-hover:rgba(255,255,255,.09); --tb-accent:#38bdf8; }
  }
  html[data-theme="dark"]{ --tb-bg:#1a1d23; --tb-fg:#e8e8ea; --tb-sub:#9aa0aa;
           --tb-border:#2a2f37; --tb-hover:rgba(255,255,255,.09); --tb-accent:#38bdf8; }
  html[data-theme="light"]{ --tb-bg:#f5f5f7; --tb-fg:#1d1d1f; --tb-sub:#6e6e73;
           --tb-border:#e2e2e7; --tb-hover:rgba(0,0,0,.07); --tb-accent:#0071e3; }
  body{ margin:0; }
  #osio-titlebar{
    position:fixed; inset:0 0 auto 0; height:var(--tb-h); z-index:2147483647;
    display:flex; align-items:center; gap:10px; padding-left:11px;
    background:var(--tb-bg); color:var(--tb-fg);
    border-bottom:1px solid var(--tb-border); user-select:none;
    font:600 13px/1 -apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #osio-titlebar .tb-brand{ display:flex; align-items:center; gap:8px; letter-spacing:.2px; }
  #osio-titlebar .tb-brand svg{ width:18px; height:18px; border-radius:5px; display:block; }
  #osio-titlebar .tb-brand .tb-dim{ color:var(--tb-sub); font-weight:500; }
  #osio-titlebar .tb-drag{ flex:1 1 auto; align-self:stretch; }
  #osio-titlebar .tb-controls{ display:flex; height:100%; }
  #osio-titlebar .tb-btn{
    width:46px; height:100%; border:0; background:transparent; color:inherit;
    display:grid; place-items:center; cursor:default; outline:0;
  }
  #osio-titlebar .tb-btn:hover{ background:var(--tb-hover); }
  #osio-titlebar .tb-btn.tb-close:hover{ background:#e81123; color:#fff; }
  #osio-titlebar .tb-btn svg{ width:11px; height:11px; }
  /* reserve space (osionos shell uses h-screen / 100vh) */
  #root>*{ margin-top:var(--tb-h) !important; height:calc(100vh - var(--tb-h)) !important; }
  /* invisible resize handles (frameless window) */
  .osio-rz{ position:fixed; z-index:2147483646; }
  .osio-rz.n{ top:0; left:8px; right:8px; height:4px; cursor:ns-resize; }
  .osio-rz.s{ bottom:0; left:8px; right:8px; height:4px; cursor:ns-resize; }
  .osio-rz.e{ top:8px; bottom:8px; right:0; width:4px; cursor:ew-resize; }
  .osio-rz.w{ top:8px; bottom:8px; left:0; width:4px; cursor:ew-resize; }
  .osio-rz.ne{ top:0; right:0; width:9px; height:9px; cursor:nesw-resize; }
  .osio-rz.nw{ top:0; left:0; width:9px; height:9px; cursor:nwse-resize; }
  .osio-rz.se{ bottom:0; right:0; width:9px; height:9px; cursor:nwse-resize; }
  .osio-rz.sw{ bottom:0; left:0; width:9px; height:9px; cursor:nesw-resize; }
</style>
<script>
(function () {
  function mount() {
    if (!window.__TAURI__ || !window.__TAURI__.window || document.getElementById('osio-titlebar')) return;
    var W = window.__TAURI__.window;
    var win = W.getCurrentWindow();
    var bar = document.createElement('div');
    bar.id = 'osio-titlebar';
    bar.innerHTML =
      '<span class="tb-brand">' +
        '<svg viewBox="0 0 32 32" aria-hidden="true"><rect width="32" height="32" rx="7" fill="#0B63CE"/>' +
        '<circle cx="16" cy="16" r="7.5" fill="none" stroke="#fff" stroke-width="3.2"/></svg>' +
        'osionos <span class="tb-dim">Track Binocle</span></span>' +
      '<div class="tb-drag" data-tauri-drag-region></div>' +
      '<div class="tb-controls">' +
        '<button class="tb-btn tb-min" title="Minimize"><svg viewBox="0 0 12 12"><rect x="2" y="6" width="8" height="1.3" fill="currentColor"/></svg></button>' +
        '<button class="tb-btn tb-max" title="Maximize"><svg viewBox="0 0 12 12"><rect x="2.5" y="2.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>' +
        '<button class="tb-btn tb-close" title="Close"><svg viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.4"/></svg></button>' +
      '</div>';
    document.body.appendChild(bar);
    bar.querySelector('.tb-min').addEventListener('click', function () { win.minimize(); });
    bar.querySelector('.tb-max').addEventListener('click', function () { win.toggleMaximize(); });
    bar.querySelector('.tb-close').addEventListener('click', function () { win.close(); });
    bar.querySelector('.tb-drag').addEventListener('dblclick', function () { win.toggleMaximize(); });

    var dirs = { n:'North', s:'South', e:'East', w:'West', ne:'NorthEast', nw:'NorthWest', se:'SouthEast', sw:'SouthWest' };
    Object.keys(dirs).forEach(function (k) {
      var h = document.createElement('div'); h.className = 'osio-rz ' + k;
      h.addEventListener('mousedown', function (e) { if (e.button === 0) { e.preventDefault(); win.startResizeDragging(dirs[k]); } });
      document.body.appendChild(h);
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount);
  else mount();
})();
</script>
