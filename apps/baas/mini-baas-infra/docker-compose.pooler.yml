# docker-compose.pooler.yml — OPT-IN connection-pooler overlay (Track C / C1).
#
# Wires the data plane to route its SYSTEM Postgres traffic (the outbox DSN —
# the only connection-target the data plane owns directly; per-tenant mounts
# resolve their DSN from adapter-registry, untouched here) through the supabase
# Supavisor pooler instead of hitting Postgres directly. The base
# docker-compose.yml ships a Supavisor service STUB (profiles: control-plane,
# extras) that is unwired — this overlay gives it the env it needs and points
# the data plane at it.
#
# NEVER a default. The base stack must stay byte-parity: this file is applied
# explicitly and ONLY when validating the pooled path:
#
#   docker compose -f docker-compose.yml -f docker-compose.pooler.yml up -d \
#       postgres supavisor data-plane-router-rust
#
# Tear down by re-upping WITHOUT this file. Parity expectation + the verify
# steps are in scripts/scale/POOLER.md.
#
# HONESTY (kernel rule #4/#5): the two data-plane env vars below
# (DATA_PLANE_POOLER_URL, DATA_PLANE_STATEMENT_CACHE) are the C1 WIRING SEAM.
# As of this change the Rust data plane does not yet READ them, so applying this
# overlay is INERT for the data plane's connection target — it brings up a real,
# health-gated Supavisor next to Postgres and stamps the intended config, but
# does not silently reroute traffic. The Rust slice that consumes these vars
# (config.rs: prefer DATA_PLANE_POOLER_URL over DATA_PLANE_OUTBOX_DSN; disable
# client-side prepared-statement caching when DATA_PLANE_STATEMENT_CACHE=off,
# required because a transaction-mode pooler does not preserve prepared
# statements across checkouts) lands separately and is what flips the seam live.
# This is deliberate: the overlay is reviewable + lint-clean now, and turning it
# ON is a one-line code change behind the same flag — no rewrite.

services:
  # ── Supavisor: full config (the base service is a bare stub) ──────────────
  # Transaction-mode pooler in front of the system Postgres. Health-gated; the
  # data plane waits for it. SECRET_KEY_BASE / VAULT_ENC_KEY come from .env in
  # a real deploy — the inline defaults keep a dev bring-up working.
  supavisor:
    # `extras`/`control-plane` profiles on the base stub would keep it out of a
    # default `up`; this overlay drops the profile gate so the pooler comes up
    # with the explicit service list above.
    profiles: []
    environment:
      # The upstream Postgres Supavisor fronts.
      DATABASE_URL: ${POOLER_UPSTREAM_DSN:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}}
      SECRET_KEY_BASE: ${SUPAVISOR_SECRET_KEY_BASE:-${SECRET_KEY_BASE:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}}
      VAULT_ENC_KEY: ${SUPAVISOR_VAULT_ENC_KEY:-${VAULT_ENC_KEY:-0123456789abcdef0123456789abcdef}}
      # Single-node defaults — a multi-node Supavisor cluster needs ERL cookie +
      # libcluster config; that is the C2 capacity-sweep shape, not this seam.
      PORT: ${SUPAVISOR_API_PORT:-4000}
      PROXY_PORT_TRANSACTION: ${SUPAVISOR_TXN_PORT:-6543}
      PROXY_PORT_SESSION: ${SUPAVISOR_SESSION_PORT:-5432}
      POOLER_TENANT_ID: ${POOLER_TENANT_ID:-grobase}
      POOLER_DEFAULT_POOL_SIZE: ${POOLER_DEFAULT_POOL_SIZE:-20}
      POOLER_MAX_CLIENT_CONN: ${POOLER_MAX_CLIENT_CONN:-1000}
      POOLER_POOL_MODE: ${POOLER_POOL_MODE:-transaction}
    ports:
      # Expose the transaction-mode proxy on the host for the parity probe.
      - "127.0.0.1:${SUPAVISOR_TXN_PORT:-6543}:6543"

  # ── Data plane: point the SYSTEM/outbox DSN at the pooler + signal txn mode ─
  data-plane-router-rust:
    environment:
      # C1 WIRING SEAM (inert until config.rs reads it — see header). Transaction
      # mode → port 6543. Falls back to direct Postgres when unset, which is the
      # base-stack default, preserving byte-parity.
      DATA_PLANE_POOLER_URL: ${DATA_PLANE_POOLER_URL:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@supavisor:6543/${POSTGRES_DB:-postgres}}
      # Transaction-mode poolers do NOT preserve prepared statements across
      # checkouts; the consuming code disables client-side statement caching when
      # this is `off`. Default `on` (direct) so the unset/base path is unchanged.
      DATA_PLANE_STATEMENT_CACHE: ${DATA_PLANE_STATEMENT_CACHE:-off}
    depends_on:
      supavisor:
        condition: service_healthy
