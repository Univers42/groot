  # Edge Functions Runtime (G9). The Deno runtime serves /v1/functions...;
  # strip_path drops /functions/v1 and the upstream url re-adds /v1/functions, so
  # /functions/v1            -> /v1/functions            (list/deploy)
  # /functions/v1/<name>     -> /v1/functions/<name>     (read/delete)
  # /functions/v1/<name>/invoke -> /v1/functions/<name>/invoke
  # Tenant identity: the global pre-function plugin forwards X-User-Id from the
  # verified JWT, which the runtime accepts as a tenant fallback. Plugins mirror
  # an app route (key-auth + jwt(iss) + rate-limiting + request-size-limiting).
  - name: functions
    url: http://functions-runtime:3060/v1/functions
    routes:
      - name: functions-routes
        paths: [/functions/v1]
        strip_path: true
        plugins:
          - name: key-auth
            config:
              key_names: [apikey]
              hide_credentials: false
          - name: jwt
            config:
              header_names: [authorization]
              key_claim_name: iss
              claims_to_verify: [exp]
              run_on_preflight: false
              anonymous: __KONG_ANON_UUID__
          - name: rate-limiting
            config:
              policy: local
              limit_by: ip
              minute: 120
              hour: 3000
          - name: request-size-limiting
            config:
              allowed_payload_size: 512
              size_unit: kilobytes

