    routes:
      - name: storage-sign-routes
        # strip_path:false — storage-router controllers are mounted at the full
        # public path (@Controller('storage/v1')); forward the path verbatim.
        # (Previously strip_path:true on [/storage/v1/sign] 404'd: Kong stripped
        # the whole prefix, leaving /<bucket>/<key> which the controller never
        # matched.) These op-paths are more specific than the minio /storage/v1
        # route, so they win for the storage-router API surface.
        paths: [/storage/v1/sign, /storage/v1/object, /storage/v1/list, /storage/v1/bucket]
        strip_path: false
        plugins:
          - name: key-auth
