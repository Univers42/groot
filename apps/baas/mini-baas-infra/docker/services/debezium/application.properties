debezium.sink.type=redis
debezium.sink.redis.address=redis:6379
debezium.sink.redis.memory.limit.mb=128
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.plugin.name=pgoutput
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=${POSTGRES_USER:postgres}
debezium.source.database.password=${POSTGRES_PASSWORD:postgres}
debezium.source.database.dbname=${POSTGRES_DB:postgres}
debezium.source.topic.prefix=mini_baas
debezium.source.table.include.list=public.outbox_events
debezium.source.slot.name=mini_baas_outbox_slot
debezium.source.publication.name=mini_baas_outbox_pub
debezium.source.tombstones.on.delete=false
debezium.format.key=json
debezium.format.value=json