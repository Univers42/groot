# File: docker/services/trino/conf/catalog/iceberg.properties
# Trino Iceberg catalog (M2 federation).
# Uses the REST catalog server (`iceberg-rest` service) backed by MinIO via
# S3-compatible API. The warehouse path lives in the `iceberg` bucket which
# is created at bootstrap by the `minio-init` job (see docker-compose.yml).
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.warehouse=s3://iceberg/
iceberg.file-format=parquet
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
