global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: query-router
    metrics_path: /metrics
    static_configs:
      - targets: ["query-router:4001"]
        labels:
          service: query-router

  - job_name: mongo-api
    metrics_path: /metrics
    static_configs:
      - targets: ["mongo-api:3010"]
        labels:
          service: mongo-api

  - job_name: storage-router
    metrics_path: /metrics
    static_configs:
      - targets: ["storage-router:3040"]
        labels:
          service: storage-router

  - job_name: permission-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["permission-engine:3050"]
        labels:
          service: permission-engine

  - job_name: gdpr-service
    metrics_path: /metrics
    static_configs:
      - targets: ["gdpr-service:3080"]
        labels:
          service: gdpr-service

  - job_name: session-service
    metrics_path: /metrics
    static_configs:
      - targets: ["session-service:3120"]
        labels:
          service: session-service

  - job_name: log-service
    metrics_path: /metrics
    static_configs:
      - targets: ["log-service:3110"]
        labels:
          service: log-service

  - job_name: newsletter-service
    metrics_path: /metrics
    static_configs:
      - targets: ["newsletter-service:3090"]
        labels:
          service: newsletter-service

  - job_name: schema-service
    metrics_path: /metrics
    static_configs:
      - targets: ["schema-service:3060"]
        labels:
          service: schema-service

  - job_name: outbox-relay
    metrics_path: /metrics
    static_configs:
      - targets: ["outbox-relay:3130"]
        labels:
          service: outbox-relay

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:9464"]
        labels:
          service: otel-collector

  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
