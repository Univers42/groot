[package]
name = "data-plane-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "data-plane-router"
path = "src/main.rs"

[dependencies]
data-plane-core = { path = "../data-plane-core" }
data-plane-pool = { path = "../data-plane-pool" }
anyhow = { workspace = true }
axum = { workspace = true }
# Phase 7 bypass: Rust-native API-key verification (tenant-control) + mount
# resolution (adapter-registry) over HTTP. Go stays the identity authority.
reqwest = { workspace = true }
# Phase 7d: outbox emission to the system Postgres (realtime/webhooks/
# projections read public.outbox_events and must keep firing post-cutover).
deadpool-postgres = { workspace = true }
tokio-postgres = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
# For implementing the `TxHandle` trait (which is `#[async_trait]`) in the
# expired-transaction reaper unit tests.
async-trait = { workspace = true }
