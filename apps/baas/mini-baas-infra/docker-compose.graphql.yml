# docker-compose.graphql.yml — A5 GraphQL EDITION overlay.
#
# Opt-in: run the stack with this overlay to make PostgREST's GraphQL endpoint
# (/graphql/v1) genuinely live. It swaps the lean alpine Postgres for the
# Debian-glibc variant that bundles pg_graphql (the extension ships only as a
# glibc artifact — see docker/services/postgres-graphql/Dockerfile), and exposes
# the graphql_public schema to PostgREST so the /rpc/graphql wrapper resolves.
#
#   make up EDITION=<…> COMPOSE_FILE override, or:
#   docker compose -f docker-compose.yml -f docker-compose.graphql.yml up -d postgres postgrest
#   make migrate            # 035_pg_graphql.sql creates the extension + wrapper
#
# SCOPE: this variant carries pg_net + pg_graphql but NOT the cross-engine FDWs
# the alpine image builds — use the default edition for FDW features. The lean
# alpine image stays the default; 035_pg_graphql.sql no-ops there.
#
# NOTE: switching the running cluster between the musl (alpine) and glibc
# (debian) builds on the SAME data volume can trip collation-version warnings;
# for a clean GraphQL edition start from a fresh `postgres-data` volume (or run
# the isolated m59 gate, which uses its own ephemeral volume).

services:
  postgres:
    build:
      context: ./docker/services/postgres-graphql
      dockerfile: Dockerfile
    image: mini-baas-postgres-graphql:16

  postgrest:
    environment:
      # Expose graphql_public so POST /rpc/graphql (← Kong /graphql/v1) resolves.
      PGRST_DB_SCHEMAS: public,graphql_public
