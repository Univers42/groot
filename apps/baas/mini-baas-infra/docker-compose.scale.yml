# Scale-experiment overrides (program phase B — 10K-tenant validation).
# NEVER a default: raising max_connections costs ~10 KB of Postgres RAM per
# slot and masks pool-policy bugs in normal runs. Apply explicitly:
#
#   docker compose -f docker-compose.yml -f docker-compose.scale.yml up -d postgres
#   docker compose -f docker-compose.yml -f docker-compose.scale.yml restart data-plane-router-rust
#
# Pairs with `make scale-seed SCALE=10000` (go/control-plane/cmd/scale-seed)
# and the B2 multi-tenant k6 workload. Tear down by re-upping WITHOUT this file.
services:
  postgres:
    # MUST preserve the base flags (shared_preload_libraries=pg_net,
    # wal_level=logical) — the outbox uses a logical replication slot that
    # refuses to start under wal_level<logical. We only ADD the connection +
    # buffer headroom the scale experiment needs.
    command: >
      postgres
        -c shared_preload_libraries=pg_net
        -c wal_level=logical
        -c pg_net.database_name=${POSTGRES_DB:-postgres}
        -c max_connections=2000
        -c shared_buffers=512MB
    mem_limit: 1g

  data-plane-router-rust:
    environment:
      # 10K tenants × N mounts exceed the default 256-pool LRU (the #1 scale
      # bottleneck — registry churn). The experiments sweep this value.
      DATA_PLANE_MAX_POOLS: ${DATA_PLANE_MAX_POOLS:-4096}
      # B4-pools (100K lever): collapse shared_rls tenants on one DB to a single
      # pool keyed by connection target, not tenant. Flip to 1 for the shared_rls
      # variant of the scale run and watch baas_data_plane_pools_open stay flat
      # as tenants climb (instead of tracking tenant count). Default off → the
      # per-tenant-pool baseline the churn curve is measured against.
      DATA_PLANE_SHARE_POOLS: ${DATA_PLANE_SHARE_POOLS:-0}

  # NOTE: the former PACKAGE_ENFORCEMENT=0 workaround here is GONE. provision's
  # CreateTenant now threads the request `plan` field (reconcile.go →
  # findOrCreateBySlug → CreateTenantRequest.Plan), so `make scale-seed` issues
  # genuine `pro` tenants whose package legitimately allows postgresql mounts
  # under enforcement. The scale run now measures the plane WITH tiering on —
  # the production shape — instead of bypassing it.
