# File: .github/workflows/ci.yml
# CI pipeline — shellcheck, Docker builds, integration tests
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ─── Job 1: Shellcheck on all .sh files ────────────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Shellcheck all .sh files
        run: |
          set -euo pipefail
          shfiles=$(find scripts vendor/scripts -type f -name '*.sh' 2>/dev/null)
          if [ -z "$shfiles" ]; then
            echo "No .sh files found"; exit 0
          fi
          echo "$shfiles" | xargs shellcheck -S error -e SC1091 -e SC2034
          echo "✓ shellcheck passed on $(echo "$shfiles" | wc -l) files"

  # ─── Job 2: Docker build (no-cache) for all services ──────────
  docker-build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - mongo-api
          - adapter-registry
          - query-router
          - email-service
          - storage-router
          - data-plane-router   # the Rust data plane — was missing from CI builds
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Restore Docker layer cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            buildx-${{ matrix.service }}-

      - name: Build ${{ matrix.service }} (no-cache)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./docker/services/${{ matrix.service }}
          push: false
          no-cache: true
          tags: mini-baas/${{ matrix.service }}:ci-${{ github.sha }}
          provenance: true
          sbom: true
          cache-from: type=local,src=/tmp/.buildx-cache/${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-new/${{ matrix.service }},mode=max

      - name: Rotate cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache/${{ matrix.service }}
          mv /tmp/.buildx-cache-new/${{ matrix.service }} /tmp/.buildx-cache/${{ matrix.service }} 2>/dev/null || true

  # ─── Job 3: Integration tests ──────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [shellcheck, docker-build]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Generate CI environment
        run: bash scripts/generate-env.sh .env

      - name: Build and start core stack
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml up -d

      - name: Wait for gateway health (max 120s)
        run: |
          set -euo pipefail
          APIKEY=$(grep KONG_PUBLIC_API_KEY .env | cut -d= -f2)
          elapsed=0
          while [ "$elapsed" -lt 120 ]; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              http://localhost:8000/auth/v1/health \
              -H "apikey: $APIKEY" 2>/dev/null || echo "000")
            if [ "$code" = "200" ]; then
              echo "✓ Gateway healthy after ${elapsed}s"
              exit 0
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "✗ Gateway health check failed after 120s"
          docker compose -f docker-compose.yml logs --tail=80
          exit 1

      - name: Run test phases 1-4, 14, 15
        env:
          FORCE_COLORS: "0"
        run: |
          set -euo pipefail
          rc_all=0
          for phase in 1 2 3 4 14 15; do
            script=$(ls scripts/phase${phase}-*.sh scripts/phase${phase}-*.py 2>/dev/null | head -1 || true)
            if [ -z "$script" ]; then
              echo "⚠ No test script for phase ${phase}, skipping"
              continue
            fi
            echo "═══ Running: $script ═══"
            case "$script" in
              *.py) python3 "$script" || rc_all=1 ;;
              *)    bash    "$script" || rc_all=1 ;;
            esac
            sleep 1
          done
          [ "$rc_all" -eq 0 ] || { echo "✗ Some test phases failed"; exit 1; }
          echo "✓ All test phases passed"

      - name: Gateway query-path regression gate (m102)
        env:
          BASE_URL: http://localhost:8000
        run: |
          set -euo pipefail
          # The 2026-06-13 regression: the gateway query path was 404-broken and
          # CI only probed /auth/v1/health. m102 asserts /query/v1, /data/v1 and
          # /rest/v1 are routed (not Kong no-route 404) against the live stack.
          export M102_APIKEY="$(grep KONG_PUBLIC_API_KEY .env | cut -d= -f2)"
          bash scripts/verify/m102-gateway-query-path.sh

      - name: Capture compose logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose -f docker-compose.yml ps    > artifacts/compose-ps.txt   2>&1 || true
          docker compose -f docker-compose.yml logs --no-color > artifacts/compose-logs.txt 2>&1 || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.run_id }}
          path: artifacts/
          retention-days: 7

      - name: Teardown stack
        if: always()
        run: docker compose -f docker-compose.yml down -v

  # ─── Job 4: Cloud / billing isolated gates ─────────────────────
  # The Track-B go-live gates are self-contained (private docker network, scratch
  # postgres+redis, images built from source, EXIT-trap cleanup) — they never
  # touch a mini-baas-* resource and need no live stack. The first gate's Rust
  # build warms the local layer cache; the rest reuse it. These were previously
  # local-only — running them in CI means a green build actually proves quota
  # enforcement, spend caps, abuse guard, the API-version contract and the cloud
  # funnel, not just the smoke phases.
  cloud-gates:
    name: Cloud gates (m101 m89 m90 m91 m94)
    runs-on: ubuntu-latest
    needs: [shellcheck]
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Run isolated cloud gates
        run: |
          set -uo pipefail
          rc_all=0
          # m101 first (billing truth-gate, supersedes the vacuous m80) so its
          # data-plane-router build primes the shared layer cache for the rest.
          for gate in m101-quota-realtenant m89-spend-caps m90-abuse-guard m91-api-version-contract m94-cloud-funnel; do
            script="scripts/verify/${gate}.sh"
            [ -f "$script" ] || { echo "⚠ missing $script — skipping"; continue; }
            echo "═══ Running: $script ═══"
            bash "$script" || { echo "✗ $gate FAILED"; rc_all=1; }
          done
          [ "$rc_all" -eq 0 ] || { echo "✗ Some cloud gates failed"; exit 1; }
          echo "✓ All cloud gates passed"
