{{- if .Values.ingress.enabled }}
{{- $root := . -}}
{{- /* The managed-cloud front door. Routes to the kong plane Service (kong is
the in-cluster API gateway that owns /api + /data + /auth routing); the Ingress
is purely L7 TLS termination + host routing in front of it. */ -}}
{{- $kong := .Values.planes.kong -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "grobase.commonLabels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $root.Release.Name }}-kong
                port:
                  number: {{ $kong.port | default 8000 }}
          {{- end }}
    {{- end }}
{{- end }}
