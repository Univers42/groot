{{- if .Values.vault.enabled }}
{{- /* HashiCorp Vault CSI SecretProviderClass — the preferred prod secret path.
Requires the Secrets Store CSI driver + the Vault provider installed in-cluster.
Each plane mounts the resulting volume at /vault/secrets; when syncToK8sSecret is
true the keys are also projected into a K8s Secret so envFrom can pick them up. */ -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Release.Name }}-spc
  labels:
    {{- include "grobase.commonLabels" . | nindent 4 }}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ .Values.vault.vaultAddress | quote }}
    roleName: {{ .Values.vault.roleName | quote }}
    objects: |
      {{- range .Values.vault.objects }}
      - objectName: {{ .objectName | quote }}
        secretPath: {{ .secretPath | quote }}
        secretKey: {{ .secretKey | quote }}
      {{- end }}
  {{- if .Values.vault.syncToK8sSecret }}
  secretObjects:
    - secretName: {{ .Values.vault.k8sSecretName }}
      type: Opaque
      data:
        {{- range .Values.vault.objects }}
        - objectName: {{ .objectName | quote }}
          key: {{ .secretKey | quote }}
        {{- end }}
  {{- end }}
{{- end }}
