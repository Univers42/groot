{{/*
Release ConfigMap (non-secret env) — the compose env_file equivalent for public
config. Always rendered so every plane's envFrom resolves; operators add their
full non-secret .env via `--set-file` or by editing values.env.configMap.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-env
  labels:
    {{- include "grobase.commonLabels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.env.configMap }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- if and .Values.env.secret.create (not .Values.vault.enabled) }}
---
{{/*
Fallback K8s Secret — only when Vault-CSI is OFF and the operator opted in. In
prod prefer vault.enabled=true (the SecretProviderClass). An empty `.data` is a
legal empty Secret the operator fills via --set env.secret.data.KEY=…
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "grobase.commonLabels" . | nindent 4 }}
type: Opaque
data:
  {{- range $k, $v := .Values.env.secret.data }}
  {{ $k }}: {{ $v | b64enc | quote }}
  {{- end }}
{{- end }}
